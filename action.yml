name: 'PyPi Increment Publish'
description: 'Increments pyproject.toml version, builds distribution packages, creates a GitHub Release, and publishes to PyPI.'
author: 'MineFartS'

branding:
  icon: 'package'
  color: 'blue'

inputs:
  project_path:
    description: 'Path to the directory containing pyproject.toml'
    required: false
    default: '.'

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Pip Packages
      shell: bash
      run: python -m pip install pip build toml

    - name: Update version in pyproject.toml
      shell: bash
      run: |
        python -c "
        import os
        from toml import load, dump
        
        path = os.path.join('${{ inputs.project_path }}', 'pyproject.toml')
        
        with open(path, 'r') as f:
            data = load(f)

        version_str = data['project']['version'].lstrip('v')
        parts = version_str.split('.')
        parts[-1] = str(int(parts[-1]) + 1)
        v = '.'.join(parts)

        data['project']['version'] = v
        
        with open(path, 'w') as f:
            dump(data, f)

        with open(os.environ['GITHUB_ENV'], 'a') as f:
            f.write(f'v={v}\n')
        "

    - name: Commit and push updated pyproject.toml
      shell: bash
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add "${{ inputs.project_path }}/pyproject.toml"
        git commit -m "chore: bump version to v${{ env.v }} [skip ci]"
        git push

    - name: Build distribution packages
      shell: bash
      run: |
        cd ${{ inputs.project_path }}
        python -m build

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.v }}
        name: v${{ env.v }}
        body: Increment Version
        files: ${{ inputs.project_path }}/dist/* 

    - uses: pypa/gh-action-pypi-publish@release/v1

